<script>
// Register service worker
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(r => console.log("✅ OkadaRide SW registered"))
      .catch(e => console.log("SW error:", e));
  });
}

// PWA Install prompt
let deferredPrompt;
window.addEventListener("beforeinstallprompt", e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show our custom install button after 3 seconds
  setTimeout(() => {
    const banner = document.getElementById("pwa-banner");
    if(banner) banner.style.display = "flex";
  }, 3000);
});

window.installPWA = async () => {
  const banner = document.getElementById("pwa-banner");
  if(deferredPrompt){
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    if(banner) banner.style.display = "none";
  }
};

window.dismissPWA = () => {
  const banner = document.getElementById("pwa-banner");
  if(banner) banner.style.display = "none";
  localStorage.setItem("pwa_dismissed", "1");
};

// Don't show if already dismissed
window.addEventListener("DOMContentLoaded", () => {
  if(localStorage.getItem("pwa_dismissed")){
    const banner = document.getElementById("pwa-banner");
    if(banner) banner.style.display = "none";
  }
});

// Hide banner if already installed
window.addEventListener("appinstalled", () => {
  const banner = document.getElementById("pwa-banner");
  if(banner) banner.style.display = "none";
  console.log("✅ OkadaRide installed as PWA");
});
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp, getDocs, query, where, onSnapshot, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB5pXIFi1txKGJ6Xs9Rndfmu4enIuONGDk",
  authDomain: "okadaride-a1ec9.firebaseapp.com",
  projectId: "okadaride-a1ec9",
  storageBucket: "okadaride-a1ec9.firebasestorage.app",
  messagingSenderId: "152050146022",
  appId: "1:152050146022:web:d3210fbd1a93c4e9813927",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Generate 6 digit code
window.generateOTP = () => Math.floor(100000 + Math.random() * 900000).toString();

// Send code via WhatsApp
window.sendWhatsAppOTP = (phone, code) => {
  const clean = phone.replace(/[^0-9]/g,"");
  const gh = clean.startsWith("0") ? "233"+clean.slice(1) : clean.startsWith("233") ? clean : "233"+clean;
  const msg = `🛺 *OkadaRide Ghana Verification*\n\nYour login code is:\n\n*${code}*\n\nThis code expires in 10 minutes.\nDo not share with anyone.\n\n_OkadaRide Ghana 🇬🇭_`;
  const url = `https://wa.me/${gh}?text=${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
};

// Save passenger
window.savePassenger = async (data) => {
  try {
    await addDoc(collection(db, "passengers"), { ...data, createdAt: serverTimestamp() });
    return { success: true };
  } catch(e) { return { success: false }; }
};

// Save booking
window.saveBooking = async (data) => {
  try {
    const ref = await addDoc(collection(db, "bookings"), { ...data, status: "requested", createdAt: serverTimestamp() });
    return { success: true, id: ref.id };
  } catch(e) { return { success: false, error: e.message }; }
};

// Save driver application
window.saveDriverApplication = async (data) => {
  try {
    const ref = await addDoc(collection(db, "driver_applications"), { ...data, status: "pending", submittedAt: serverTimestamp() });
    return { success: true, id: ref.id };
  } catch(e) { return { success: false, error: e.message }; }
};

// Fetch approved drivers from Firebase
window.fetchApprovedDrivers = async (region) => {
  try {
    const q = query(collection(db, "driver_applications"), where("status", "==", "approved"));
    const snap = await getDocs(q);
    const all = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    // Filter by region if provided, else return all
    const filtered = region ? all.filter(d => d.region === region || d.operatingZone?.toLowerCase().includes(region.toLowerCase())) : all;
    return filtered.map((d, i) => ({
      id: d.id,
      name: d.fullName,
      rating: (4.5 + Math.random() * 0.5).toFixed(1),
      trips: Math.floor(50 + Math.random() * 300),
      eta: `${2 + i * 2} min`,
      plate: d.plate,
      phone: d.phone,
      avatar: ["🧑🏾","👨🏿","🧑🏽","👨🏾","🧑🏿"][i % 5],
      verified: true,
      color: d.tricycleColor,
      region: d.region,
      zone: d.operatingZone,
    }));
  } catch(e) { return []; }
};

// WhatsApp notify DRIVER directly
window.notifyDriver = (booking, driver) => {
  const clean = driver.phone.replace(/[^0-9]/g,"");
  const gh = clean.startsWith("0") ? "233"+clean.slice(1) : clean.startsWith("233") ? clean : "233"+clean;
  const msg = `🛺 *NEW OKADARIDE RIDE REQUEST!*\n\n`+
    `👤 Passenger: ${booking.passengerName}\n`+
    `📞 Passenger Phone: ${booking.passengerPhone}\n`+
    `📍 Pickup: ${booking.pickup}\n`+
    `🎯 Dropoff: ${booking.dropoff}\n`+
    `🇬🇭 Region: ${booking.region}\n`+
    `💰 Payment: ${booking.paymentMethod === "cash" ? "💵 Cash" : "📱 Mobile Money"}\n`+
    `⏰ Time: ${new Date().toLocaleString()}\n\n`+
    `Please open your OkadaRide Driver Portal to Accept or Decline:\n`+
    `👉 https://frempah.github.io/OakdaRide2.gh/driver.html\n\n`+
    `_OkadaRide Ghana 🇬🇭_`;
  window.open(`https://wa.me/${gh}?text=${encodeURIComponent(msg)}`, "_blank");
};

// WhatsApp notify DISPATCHER (you) as backup copy
window.notifyDispatcher = (booking, driver) => {
  const msg = `🛺 *NEW OKADARIDE BOOKING — COPY*\n\n`+
    `👤 Passenger: ${booking.passengerName}\n`+
    `📞 Phone: ${booking.passengerPhone}\n`+
    `📍 Pickup: ${booking.pickup}\n`+
    `🎯 Dropoff: ${booking.dropoff}\n`+
    `🇬🇭 Region: ${booking.region}\n`+
    `🚗 Driver notified: ${driver.name} (${driver.plate})\n`+
    `📞 Driver phone: ${driver.phone}\n`+
    `💰 Payment: ${booking.paymentMethod === "cash" ? "💵 Cash" : "📱 Mobile Money"}\n`+
    `⏰ Time: ${new Date().toLocaleString()}\n`+
    `🔖 Ref: ${booking.id || "NEW"}`;
  window.open(`https://wa.me/233542008513?text=${encodeURIComponent(msg)}`, "_blank");
};

// Listen to booking status in real time for passenger tracking
window.listenBookingStatus = (bookingId, cb) => {
  try {
    return onSnapshot(doc(db, "bookings", bookingId), (snap) => {
      if (snap.exists()) cb({ id: snap.id, ...snap.data() });
    });
  } catch(e) { return () => {}; }
};

// WhatsApp driver
window.whatsappDriver = (phone, passengerName, pickup, dropoff) => {
  const clean = phone.replace(/[^0-9]/g,"");
  const gh = clean.startsWith("0") ? "233"+clean.slice(1) : clean;
  const msg = `Hello! I am ${passengerName}. I just booked an OkadaRide from *${pickup}* to *${dropoff}*. Are you on your way?`;
  window.open(`https://wa.me/${gh}?text=${encodeURIComponent(msg)}`, "_blank");
};

// Send chat message
window.sendChatMessage = async (bookingId, sender, senderName, text) => {
  try {
    await addDoc(collection(db, "bookings", bookingId, "messages"), {
      sender, senderName, text, createdAt: serverTimestamp()
    });
    return { success: true };
  } catch(e) { return { success: false }; }
};

// Listen to chat messages
window.listenChat = (bookingId, cb) => {
  try {
    const q = query(collection(db, "bookings", bookingId, "messages"), orderBy("createdAt", "asc"));
    return onSnapshot(q, snap => {
      cb(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  } catch(e) { return () => {}; }
};

window.firebaseReady = true;
console.log("✅ OkadaRide v4 Firebase ready");
</script>

function WhatsAppLogin({onLogin}){
  const [step,setStep]=useState("phone");
  const [phone,setPhone]=useState("");
  const [name,setName]=useState("");
  const [code,setCode]=useState(["","","","","",""]);
  const [generatedCode,setGeneratedCode]=useState("");
  const [error,setError]=useState("");
  const [timer,setTimer]=useState(0);
  const refs=useRef([]);

  useEffect(()=>{
    if(timer>0){const t=setTimeout(()=>setTimer(r=>r-1),1000);return()=>clearTimeout(t);}
  },[timer]);

  // Check returning user
  useEffect(()=>{
    const saved=localStorage.getItem("okada_user");
    if(saved){try{onLogin(JSON.parse(saved));}catch(e){}}
  },[]);

  const sendCode=()=>{
    const clean=phone.replace(/[^0-9]/g,"");
    if(clean.length<9){setError("Please enter a valid Ghana phone number");return;}
    setError("");
    const otp=window.generateOTP?.()|| Math.floor(100000+Math.random()*900000).toString();
    setGeneratedCode(otp);
    window.sendWhatsAppOTP?.(phone,otp);
    setStep("otp");
    setTimer(120);
  };

  const handleChange=(i,val)=>{
    if(!/^[0-9]?$/.test(val))return;
    const n=[...code];n[i]=val;setCode(n);
    if(val&&i<5)refs.current[i+1]?.focus();
  };
  const handleKey=(i,e)=>{
    if(e.key==="Backspace"&&!code[i]&&i>0)refs.current[i-1]?.focus();
  };

  const verify=()=>{
    const entered=code.join("");
    if(entered===generatedCode){
      setStep("name");
      setError("");
    } else {
      setError("Wrong code. Check your WhatsApp and try again.");
      setCode(["","","","","",""]);
      refs.current[0]?.focus();
    }
  };

  const finish=()=>{
    if(name.trim().length<2){setError("Please enter your name");return;}
    const user={phone,name:name.trim(),verified:true};
    localStorage.setItem("okada_user",JSON.stringify(user));
    window.savePassenger?.({name:name.trim(),phone});
    onLogin(user);
  };

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${C.primaryDark},#0a2a0a)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,position:"relative"}}>

          <p style={{color:C.gold,fontSize:12,fontWeight:700}}>GHANA'S TRICYCLE RIDE APP 🇬🇭</p>
        </div>

        <div style={{background:"rgba(255,255,255,.06)",borderRadius:24,padding:28,border:"1px solid rgba(255,255,255,.1)"}}>

          {/* STEP 1 — Phone */}
          {step==="phone"&&(
            <React.Fragment>
              <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:20,fontWeight:800,color:"#fff",marginBottom:6}}>Welcome! 👋</h2>
              <p style={{color:"rgba(255,255,255,.5)",fontSize:13,marginBottom:20,lineHeight:1.6}}>Enter your Ghana phone number. We'll send your verification code via <strong style={{color:"#25D366"}}>WhatsApp</strong>.</p>

// ── FARE CALCULATOR ───────────────────────────────────────────────────────────
const BASE_FARE = 3.00;
const RATE_PER_KM = 2.50;
const MIN_FARE = 5.00;

const DISTANCE_OPTIONS = [
  { label: "Under 1 km", km: 0.5, example: "e.g. Nearby market" },
  { label: "1 – 2 km", km: 1.5, example: "e.g. Short trip in town" },
  { label: "2 – 4 km", km: 3, example: "e.g. Across town" },
  { label: "4 – 7 km", km: 5.5, example: "e.g. To hospital / school" },
  { label: "7 – 10 km", km: 8.5, example: "e.g. Outskirts of town" },
  { label: "10 – 15 km", km: 12, example: "e.g. Nearby village" },
  { label: "15 km+", km: 18, example: "e.g. Long distance" },
];

function calcFare(km, promo, isNight) {
  let fare = BASE_FARE + (km * RATE_PER_KM);
  if (fare < MIN_FARE) fare = MIN_FARE;
  if (isNight) fare = fare * 1.2; // 20% night surcharge
  if (promo === "OKADA001") fare = 0; // First ride free
  return parseFloat(fare.toFixed(2));
}

function FareCalculator({ onFareSet, fare, distKm }) {
  const [distIdx, setDistIdx] = useState(1);
  const [promo, setPromo] = useState("");
  const [promoApplied, setPromoApplied] = useState(false);
  const [promoError, setPromoError] = useState("");
  const isNight = new Date().getHours() >= 20 || new Date().getHours() < 6;
  const dist = DISTANCE_OPTIONS[distIdx];
  const calculated = calcFare(dist.km, promoApplied ? promo : "", isNight);

  useEffect(() => {
    onFareSet(calculated, dist.km);
  }, [distIdx, promoApplied]);

  const applyPromo = () => {
    if (promo.toUpperCase() === "OKADA001") {
      setPromoApplied(true); setPromoError("");
    } else {
      setPromoError("Invalid promo code"); setPromoApplied(false);
    }
  };

  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
        <span style={{ fontSize: 22 }}>📏</span>
        <p style={{ fontWeight: 800, fontSize: 15, color: C.text }}>How far are you going?</p>
      </div>

      {/* Distance slider */}
      <div style={{ marginBottom: 16 }}>
        <input type="range" min={0} max={DISTANCE_OPTIONS.length - 1} value={distIdx}
          onChange={e => setDistIdx(Number(e.target.value))}
          style={{ width: "100%", accentColor: C.primary, height: 6, cursor: "pointer" }}/>

function BookingScreen({user,pickup,dropoff,region,fare,distKm,onBack,onConfirm}){
  const [sel,setSel]=useState(null);
  const [pay,setPay]=useState("cash");
  const [saving,setSaving]=useState(false);
  const [drivers,setDrivers]=useState([]);
  const [loadingDrivers,setLoadingDrivers]=useState(true);
  const displayFare=fare||5.00;

  useEffect(()=>{
    const load=async()=>{
      setLoadingDrivers(true);
      const real=await window.fetchApprovedDrivers?.(region)??[];
      if(real.length>0){setDrivers(real);}
      else{setDrivers(DEMO_DRIVERS);}
      setLoadingDrivers(false);
    };
    load();
  },[region]);

  const handleConfirm=async()=>{
    setSaving(true);
    const bookingData={passengerName:user.name,passengerPhone:user.phone,pickup,dropoff,region,driverName:sel.name,driverPlate:sel.plate,driverPhone:sel.phone,paymentMethod:pay,fare:displayFare,distanceKm:distKm||1.5};
    let bookingId="";
    if(window.saveBooking){const r=await window.saveBooking(bookingData);if(r.success)bookingId=r.id;}
    window.notifyDriver?.({...bookingData,id:bookingId},sel);
    setTimeout(()=>window.notifyDispatcher?.({...bookingData,id:bookingId},sel),1500);
    setSaving(false);
    onConfirm(sel,pay,bookingId,displayFare);
  };

  return(
    <div style={{paddingBottom:80,animation:"slideUp .35s ease"}}>
      <div style={{background:`linear-gradient(135deg,${C.primaryDark},${C.primary})`,padding:"52px 24px 24px",position:"relative"}}>

        <div style={{marginBottom:20}}><FakeMap rider={null} animate={false}/></div>
        <div style={{background:"rgba(37,211,102,.08)",border:"1px solid rgba(37,211,102,.25)",borderRadius:14,padding:"12px 14px",marginBottom:16,display:"flex",gap:10,alignItems:"center"}}>
          <span style={{fontSize:20}}>📱</span>
          <div>
            <p style={{fontSize:13,fontWeight:800,color:"#006B2E"}}>WhatsApp alerts sent automatically!</p>
            <p style={{fontSize:12,color:"#3D6645",marginTop:3}}>Driver gets notified directly + dispatcher gets a copy 🇬🇭</p>
          </div>
        </div>
        <p style={{fontWeight:800,fontSize:15,color:C.text,marginBottom:12}}>
          {loadingDrivers?"Loading riders...":drivers.length===0?"No riders available right now":`${drivers.length} Rider${drivers.length>1?"s":""} Available`}
        </p>
        {loadingDrivers?(
          <div style={{textAlign:"center",padding:30}}><div style={{width:36,height:36,border:`3px solid ${C.border}`,borderTop:`3px solid ${C.primary}`,borderRadius:"50%",animation:"spin .8s linear infinite",margin:"0 auto"}}/><p style={{color:C.textMid,marginTop:10,fontWeight:700}}>Finding riders near you...</p></div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:20}}>
            {drivers.map(d=>(
              <div key={d.id} onClick={()=>setSel(d)} style={{background:sel?.id===d.id?C.accentSoft:"#fff",border:`2px solid ${sel?.id===d.id?C.primary:C.border}`,borderRadius:18,padding:16,cursor:"pointer",display:"flex",alignItems:"center",gap:14,boxShadow:"0 2px 12px rgba(27,122,47,.06)",transition:"all .2s"}}>

        </Btn>
      </div>
    </div>
  );

// ── CHAT BOX (PASSENGER SIDE) ─────────────────────────────────────────────────
const PASSENGER_QUICK=["I am waiting outside 👋","On my way to pickup 🚶","Please wait 2 minutes ⏳","I can see you! 👀","Where are you? 📍","I am at the gate 🚪","Almost there! 🏃","Thank you driver! 🙏"];

function PassengerChatBox({bookingId,user,driverName}){
  const [messages,setMessages]=useState([]);
  const [text,setText]=useState("");
  const [sending,setSending]=useState(false);
  const bottomRef=useRef(null);
  const myId=`passenger_${user.phone}`;

  useEffect(()=>{
    if(!bookingId||!window.listenChat)return;
    const unsub=window.listenChat(bookingId,setMessages);
    return()=>unsub?.();
  },[bookingId]);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);

  const send=async(msg)=>{
    if(!msg.trim())return;
    setSending(true);
    await window.sendChatMessage?.(bookingId,myId,user.name,msg.trim());
    setText("");setSending(false);
  };

  return(
    <div style={{background:"#fff",borderRadius:18,overflow:"hidden",border:`1px solid ${C.border}`,marginBottom:16}}>
      <div style={{background:`linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`,padding:"11px 16px",display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>💬</span>
        <p style={{color:"#fff",fontWeight:800,fontSize:14}}>Chat with {driverName}</p>
        <div style={{marginLeft:"auto",width:8,height:8,borderRadius:"50%",background:C.gold,animation:"ping 1.5s ease-out infinite"}}/>
      </div>
      <div style={{maxHeight:200,overflowY:"auto",padding:"12px 12px 8px",display:"flex",flexDirection:"column",gap:8}}>
        {messages.length===0&&(
          <div style={{textAlign:"center",padding:"12px 0"}}>
            <p style={{fontSize:26,marginBottom:6}}>💬</p>
            <p style={{color:C.textLight,fontSize:13,fontWeight:600}}>Chat with your driver here!</p>
          </div>
        )}
        {messages.map(m=>{
          const isMine=m.sender===myId;
          const ts=m.createdAt?.seconds?new Date(m.createdAt.seconds*1000).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"";
          return(
            <div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:isMine?"flex-end":"flex-start"}}>
              <div style={{background:isMine?`linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`:"#f5f5f5",color:isMine?"#fff":C.text,borderRadius:isMine?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"9px 13px",maxWidth:"80%"}}>
                <p style={{fontSize:14,fontWeight:600,lineHeight:1.4}}>{m.text}</p>
              </div>
              <p style={{fontSize:10,color:C.textLight,marginTop:3,fontWeight:600}}>{isMine?"You":m.senderName}{ts&&` · ${ts}`}</p>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:"6px 10px",display:"flex",gap:6,overflowX:"auto",borderTop:`1px solid ${C.border}`}}>
        {PASSENGER_QUICK.map(q=>(<button key={q} onClick={()=>send(q)} style={{background:C.accentSoft,color:C.primary,border:`1px solid rgba(27,122,47,.2)`,borderRadius:20,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>{q}</button>))}
      </div>
      <div style={{display:"flex",gap:8,padding:"8px 10px",borderTop:`1px solid ${C.border}`}}>
        <input value={text} onChange={e=>setText(e.target.value)} placeholder="Type a message..." onKeyDown={e=>e.key==="Enter"&&send(text)} style={{flex:1,padding:"10px 14px",borderRadius:20,border:`1.5px solid ${C.border}`,fontSize:14,fontFamily:"'Nunito',sans-serif",color:C.text,outline:"none"}}/>
        <button onClick={()=>send(text)} disabled={!text.trim()||sending} style={{width:42,height:42,borderRadius:"50%",border:"none",background:text.trim()?`linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`:C.border,display:"flex",alignItems:"center",justifyContent:"center",cursor:text.trim()?"pointer":"not-allowed",flexShrink:0}}>
          <span style={{fontSize:18}}>➤</span>
        </button>
      </div>
    </div>
  );
}

// ── LIVE TRACKING SCREEN ──────────────────────────────────────────────────────
function TrackingScreen({user,bookingId,driver,pickup,dropoff,region,payMethod,onDriverAccepted,onCancel}){
  const [status,setStatus]=useState("requested");
  const [driverInfo,setDriverInfo]=useState(driver);

  useEffect(()=>{
    if(!bookingId||!window.listenBookingStatus)return;
    const unsub=window.listenBookingStatus(bookingId,(booking)=>{
      setStatus(booking.status);
      if(booking.status==="accepted"){
        // Send WhatsApp to passenger confirming driver is on the way
        const clean=user.phone.replace(/[^0-9]/g,"");
        const gh=clean.startsWith("0")?"233"+clean.slice(1):clean.startsWith("233")?clean:"233"+clean;
        const msg=`✅ *OkadaRide Booking Confirmed!*\n\n`+
          `Your driver *${driver.name}* has accepted your ride!\n\n`+
          `🛺 Plate: ${driver.plate}\n`+
          `📍 Pickup: ${pickup}\n`+
          `🎯 Dropoff: ${dropoff}\n`+
          `⏱️ ETA: ${driver.eta}\n\n`+
          `Your driver is on the way. Please be ready! 🇬🇭`;
        window.open(`https://wa.me/${gh}?text=${encodeURIComponent(msg)}`,"_blank");
        setTimeout(()=>onDriverAccepted(),2000);
      }
    });
    return()=>unsub?.();
  },[bookingId]);

  const steps=[
    {key:"requested",icon:"📤",label:"Booking Sent",desc:"Your request has been sent to the driver",done:true},
    {key:"accepted",icon:"✅",label:"Driver Accepted",desc:`${driver.name} is on the way!`,done:status==="accepted"||status==="completed"},
    {key:"arriving",icon:"🛺",label:"Driver Arriving",desc:`Arriving in ${driver.eta}`,done:status==="completed"},
  ];

  return(
    <div style={{minHeight:"100vh",background:C.bg,animation:"slideUp .35s ease"}}>
      <div style={{background:`linear-gradient(135deg,${C.primaryDark},${C.primary})`,padding:"52px 24px 28px",position:"relative",textAlign:"center"}}>
        <TopStripe/>
        <div style={{marginBottom:12,display:"flex",justifyContent:"center"}}>
          <div style={{position:"relative",width:80,height:80,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <div style={{position:"absolute",inset:0,borderRadius:"50%",background:"rgba(255,255,255,.1)",animation:status==="requested"?"ping 1.5s ease-out infinite":"none"}}/>
            <div style={{position:"absolute",inset:10,borderRadius:"50%",background:"rgba(255,255,255,.15)",animation:status==="requested"?"ping 1.5s ease-out infinite .5s":"none"}}/>
            <TukTuk size={44} color="#fff"/>
          </div>
        </div>
        <h2 style={{fontFamily:"'Syne',sans-serif",fontSize:22,fontWeight:800,color:"#fff",marginBottom:6}}>
          {status==="requested"?"Waiting for driver...":status==="accepted"?"Driver accepted! 🎉":"Ride in progress"}
        </h2>
        <p style={{color:"rgba(255,255,255,.6)",fontSize:13}}>
          {status==="requested"?"Your WhatsApp notification has been sent":"You'll receive a WhatsApp confirmation shortly"}
        </p>
      </div>

      <div style={{padding:"20px 20px 0"}}>
        {/* Live status steps */}
        <div style={{background:"#fff",borderRadius:20,padding:20,marginBottom:16,border:`1px solid ${C.border}`}}>
          <p style={{fontWeight:800,fontSize:15,color:C.text,marginBottom:16}}>📍 Ride Status</p>
          {steps.map((s,i)=>(
            <div key={s.key} style={{display:"flex",gap:14,alignItems:"flex-start",marginBottom:i<steps.length-1?16:0}}>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0}}>
                <div style={{width:40,height:40,borderRadius:"50%",background:s.done?`linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`:"rgba(0,0,0,.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,transition:"all .5s"}}>
                  {s.done?<span style={{fontSize:16}}>✓</span>:<span style={{opacity:.4}}>{s.icon}</span>}
                </div>
                {i<steps.length-1&&<div style={{width:2,height:20,background:s.done?C.primary:"rgba(0,0,0,.1)",marginTop:4,transition:"all .5s"}}/>}
              </div>
              <div style={{paddingTop:8}}>
                <p style={{fontWeight:800,fontSize:14,color:s.done?C.text:"rgba(0,0,0,.3)"}}>{s.label}</p>
                <p style={{color:s.done?C.textMid:"rgba(0,0,0,.2)",fontSize:12,marginTop:3}}>{s.desc}</p>
              </div>
            </div>
          ))}
        </div>

        {/* Driver details */}
        <div style={{background:"#fff",borderRadius:20,padding:16,marginBottom:16,border:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:14,paddingBottom:14,borderBottom:`1px solid ${C.border}`}}>
            <Av emoji={driver.avatar} verified={driver.verified}/>
            <div style={{flex:1}}>
              <p style={{fontWeight:800,fontSize:15,color:C.text}}>{driver.name}</p>
              <p style={{color:C.textMid,fontSize:13,marginTop:2}}>⭐ {driver.rating} · 🛺 {driver.plate}</p>
              <p style={{color:C.textLight,fontSize:12,marginTop:1}}>🎨 {driver.color} · {driver.zone||driver.region}</p>
            </div>
            <Pill color={C.success} bg="rgba(0,200,83,.1)">{driver.eta}</Pill>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[["📍 From",pickup],["🎯 To",dropoff]].map(([l,v])=>(
              <div key={l} style={{background:C.bg,borderRadius:12,padding:"10px 12px"}}>
                <p style={{color:C.textLight,fontSize:10,fontWeight:700,textTransform:"uppercase"}}>{l}</p>
                <p style={{fontWeight:700,fontSize:13,color:C.text,marginTop:3}}>{v}</p>
              </div>
            ))}
          </div>
        </div>

        {/* WhatsApp info */}
        <div style={{background:"rgba(37,211,102,.08)",border:"1px solid rgba(37,211,102,.25)",borderRadius:16,padding:"14px 16px",marginBottom:16,display:"flex",gap:10,alignItems:"flex-start"}}>
          <span style={{fontSize:22,flexShrink:0}}>💬</span>
          <div>
            <p style={{fontWeight:800,color:"#006B2E",fontSize:13}}>WhatsApp notification sent!</p>
            <p style={{color:C.textMid,fontSize:12,marginTop:3,lineHeight:1.5}}>The driver has been notified on WhatsApp. You will also receive a WhatsApp message as soon as the driver accepts your ride.</p>
          </div>
        </div>

        {/* Contact driver */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
          <a href={`tel:${driver.phone}`} style={{textDecoration:"none"}}>
            <div style={{background:`linear-gradient(135deg,${C.primaryLight},${C.primaryDark})`,borderRadius:14,padding:"13px",textAlign:"center",boxShadow:`0 4px 14px rgba(27,122,47,.3)`}}>
              <p style={{fontSize:22}}>📞</p><p style={{color:"#fff",fontWeight:800,fontSize:13,marginTop:4}}>Call Driver</p>
            </div>
          </a>
          <div onClick={()=>{const c=driver.phone.replace(/[^0-9]/g,"");const g=c.startsWith("0")?"233"+c.slice(1):c;const m=`Hello, I just booked an OkadaRide. I am ${user.name} waiting at ${pickup}.`;window.open(`https://wa.me/${g}?text=${encodeURIComponent(m)}`,"_blank");}} style={{background:`linear-gradient(135deg,#25D366,#128C7E)`,borderRadius:14,padding:"13px",textAlign:"center",cursor:"pointer",boxShadow:`0 4px 14px rgba(37,211,102,.3)`}}>
            <p style={{fontSize:22}}>💬</p><p style={{color:"#fff",fontWeight:800,fontSize:13,marginTop:4}}>WhatsApp</p>
          </div>
        </div>

        {/* In-app chat — only shown after driver accepts */}
        {status==="accepted"&&(
          <PassengerChatBox bookingId={bookingId} user={user} driverName={driver.name}/>
        )}

        <Btn ghost onClick={onCancel} style={{color:C.red,borderColor:"rgba(204,0,0,.2)",marginBottom:20}}>Cancel Booking</Btn>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [tab,setTab]=useState("home");
  const [flow,setFlow]=useState("home");
  const [pickup,setPickup]=useState("");
  const [dropoff,setDropoff]=useState("");
  const [region,setRegion]=useState("");
  const [driver,setDriver]=useState(null);
  const [pay,setPay]=useState("cash");
  const [bookingId,setBookingId]=useState("");
  const [fare,setFare]=useState(5.00);
  const [distKm,setDistKm]=useState(1.5);
  const [sos,setSos]=useState(false);

  useEffect(()=>{
    const saved=localStorage.getItem("okada_user");
    if(saved){try{setUser(JSON.parse(saved));}catch(e){}}
  },[]);

  const handleSignOut=()=>{
    localStorage.removeItem("okada_user");
    setUser(null);setFlow("home");setTab("home");
  };

  if(!user) return <WhatsAppLogin onLogin={setUser}/>;

  const inFlow=["booking","finding","tracking","ride","payment"].includes(flow);
  return(
    <div style={{fontFamily:"'Nunito',sans-serif",width:"100%",maxWidth:430,minHeight:"100vh",background:C.bg,position:"relative",overflowX:"hidden"}}>
      {sos&&<SOSModal onClose={()=>setSos(false)}/>}
      {!inFlow&&tab==="home"&&<HomeScreen user={user} goBook={(p,d,r,f,km)=>{setPickup(p);setDropoff(d);setRegion(r);setFare(f||5);setDistKm(km||1.5);setFlow("booking");}}/>}
      {!inFlow&&tab==="history"&&<HistoryScreen user={user}/>}
      {!inFlow&&tab==="driver"&&<DriverScreen/>}
      {!inFlow&&tab==="profile"&&<ProfileScreen user={user} onSignOut={handleSignOut}/>}
      {flow==="booking"&&<BookingScreen user={user} pickup={pickup} dropoff={dropoff} region={region} fare={fare} distKm={distKm} onBack={()=>setFlow("home")} onConfirm={(d,p,bid,f)=>{setDriver(d);setPay(p);setBookingId(bid);setFare(f||fare);setFlow("tracking");}}/>}
      {flow==="tracking"&&<TrackingScreen user={user} bookingId={bookingId} driver={driver} pickup={pickup} dropoff={dropoff} region={region} payMethod={pay} onDriverAccepted={()=>setFlow("ride")} onCancel={()=>{setFlow("home");setPickup("");setDropoff("");setDriver(null);setBookingId("");}}/>}
      {flow==="finding"&&<FindingScreen driver={driver} onFound={()=>setFlow("ride")}/>}
      {flow==="ride"&&<RideScreen user={user} driver={driver} pickup={pickup} dropoff={dropoff} region={region} payMethod={pay} fare={fare} onEnd={()=>setFlow("payment")} onSOS={()=>setSos(true)}/>}
      {flow==="payment"&&<PaymentScreen driver={driver} payMethod={pay} fare={fare} distKm={distKm} onDone={()=>{setFlow("home");setPickup("");setDropoff("");setDriver(null);setRegion("");setBookingId("");setFare(5);setDistKm(1.5);}}/>}
      {!inFlow&&<Nav tab={tab} setTab={setTab}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
